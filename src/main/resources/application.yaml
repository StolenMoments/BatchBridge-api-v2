server:
  port: 8080
spring:
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: -1
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:batch_bridge}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
batch-bridge:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  swagger:
    contact:
      name: Batch Bridge Support
      email: support@example.com
  supported-models:
    gemini:
      - id: gemini-2.0-flash
        displayName: Gemini 2.0 Flash
  claude:
    beta-header: message-batches-2024-09-24
    connect-timeout-ms: 10000
    read-timeout-ms: 30000
  xai:
    connect-timeout-ms: 10000
    read-timeout-ms: 60000
  api-keys:
    claude: ${CLAUDE_API_KEY}
    grok:   ${GROK_API_KEY}
    gemini: ${GEMINI_API_KEY}
external-context:
  github-token: ${GITHUB_TOKEN:}
  atlassian-base-url: ${ATLASSIAN_BASE_URL:}
  atlassian-email: ${ATLASSIAN_EMAIL:}
  atlassian-api-token: ${ATLASSIAN_API_TOKEN:}
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
